<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Davi Barber</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--accent:#C8973A;--dark:#111;--dark2:#1c1c1c;--dark3:#2a2a2a;--dark4:#333;--white:#fff;--text:#e8dfc8;--muted:#8a7a60;--green:#97C459;--red:#F09595}
  body{font-family:'Lato',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
  header{background:var(--dark2);border-bottom:2px solid var(--accent);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:64px}
  .logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--accent)}
  .logo span{font-size:12px;color:var(--muted);margin-left:10px;font-family:'Lato',sans-serif;letter-spacing:2px;text-transform:uppercase}
  .back-btn{background:transparent;border:1px solid var(--dark4);color:var(--muted);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'Lato',sans-serif;transition:all .2s;text-decoration:none}
  .back-btn:hover{border-color:var(--accent);color:var(--accent)}
  .container{max-width:900px;margin:0 auto;padding:32px 5%}

  /* LOGIN */
  .login-box{background:var(--dark2);border:1px solid var(--dark3);border-radius:16px;padding:36px;max-width:400px;margin:80px auto;text-align:center}
  .login-box h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--white);margin-bottom:8px}
  .login-box p{color:var(--muted);font-size:14px;margin-bottom:24px}
  .pass-input{width:100%;background:var(--dark3);border:1px solid var(--dark4);border-radius:10px;padding:12px 16px;font-size:15px;color:var(--white);font-family:'Lato',sans-serif;outline:none;transition:border .2s;margin-bottom:12px}
  .pass-input:focus{border-color:var(--accent)}
  .pass-input::placeholder{color:var(--muted)}
  .login-btn{width:100%;background:var(--accent);color:var(--dark);border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:'Lato',sans-serif;transition:all .2s}
  .login-btn:hover{background:#f0c96a}
  .login-err{color:var(--red);font-size:13px;margin-top:8px;display:none}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
  .stat-card{background:var(--dark2);border:1px solid var(--dark3);border-radius:12px;padding:16px}
  .stat-card-num{font-family:'Playfair Display',serif;font-size:28px;color:var(--accent)}
  .stat-card-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

  /* FILTERS */
  .filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
  .filter-btn{background:var(--dark3);border:1px solid var(--dark4);color:var(--muted);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Lato',sans-serif;transition:all .2s}
  .filter-btn.active,.filter-btn:hover{background:var(--accent);color:var(--dark);border-color:var(--accent)}
  .refresh-btn{margin-left:auto;background:transparent;border:1px solid var(--dark4);color:var(--muted);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'Lato',sans-serif;transition:all .2s}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

  /* TABLE */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--dark3);font-weight:700}
  td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
  tr:hover td{background:rgba(255,255,255,.02)}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px}
  .badge-confirmado{background:rgba(59,109,17,.2);color:#97C459;border:1px solid rgba(59,109,17,.4)}
  .badge-cancelado{background:rgba(226,75,74,.1);color:#F09595;border:1px solid rgba(226,75,74,.3)}
  .badge-concluido{background:rgba(200,151,58,.1);color:var(--accent);border:1px solid rgba(200,151,58,.3)}
  .action-btn{background:transparent;border:1px solid var(--dark4);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'Lato',sans-serif;transition:all .2s;margin-right:4px}
  .action-btn:hover{border-color:var(--accent);color:var(--accent)}
  .action-btn.del:hover{border-color:var(--red);color:var(--red)}
  .empty{text-align:center;padding:48px;color:var(--muted);font-size:15px}
  .loading-row{text-align:center;padding:32px;color:var(--muted)}
  .section-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--white);margin-bottom:20px}
</style>
</head>
<body>

<header>
  <div class="logo">✂ DAVI BARBER <span>Painel Admin</span></div>
  <a class="back-btn" href="/">← Site</a>
</header>

<!-- LOGIN -->
<div id="login-section">
  <div class="login-box">
    <h2>Painel Administrativo</h2>
    <p>Entre com a senha para ver os agendamentos</p>
    <input class="pass-input" id="pass-input" type="password" placeholder="Senha..." onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">ENTRAR</button>
    <div class="login-err" id="login-err">Senha incorreta.</div>
  </div>
</div>

<!-- PAINEL -->
<div id="admin-panel" style="display:none">
  <div class="container">
    <div class="section-title" id="panel-title">Agendamentos</div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-card-num" id="s-total">0</div><div class="stat-card-lbl">Total</div></div>
      <div class="stat-card"><div class="stat-card-num" id="s-hoje">0</div><div class="stat-card-lbl">Hoje</div></div>
      <div class="stat-card"><div class="stat-card-num" id="s-confirmado">0</div><div class="stat-card-lbl">Confirmados</div></div>
      <div class="stat-card"><div class="stat-card-num" id="s-concluido">0</div><div class="stat-card-lbl">Concluídos</div></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('confirmado',this)">Confirmados</button>
      <button class="filter-btn" onclick="setFilter('concluido',this)">Concluídos</button>
      <button class="filter-btn" onclick="setFilter('cancelado',this)">Cancelados</button>
      <button class="refresh-btn" onclick="loadData()">↻ Atualizar</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Serviço</th>
            <th>Data</th>
            <th>Horário</th>
            <th>Preço</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let pass='', allData=[], currentFilter='todos';

function doLogin(){
  pass=document.getElementById('pass-input').value;
  document.getElementById('login-err').style.display='none';
  loadData();
}

async function loadData(){
  try {
    const res=await fetch('/api/agendamentos?pass='+encodeURIComponent(pass));
    if(res.status===401){document.getElementById('login-err').style.display='block';return}
    allData=await res.json();
    document.getElementById('login-section').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    updateStats();
    renderTable();
  } catch(e){
    document.getElementById('login-err').textContent='Erro de conexão.';
    document.getElementById('login-err').style.display='block';
  }
}

function updateStats(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('s-total').textContent=allData.length;
  document.getElementById('s-hoje').textContent=allData.filter(r=>r.data===today).length;
  document.getElementById('s-confirmado').textContent=allData.filter(r=>r.status==='confirmado').length;
  document.getElementById('s-concluido').textContent=allData.filter(r=>r.status==='concluido').length;
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable(){
  const data=currentFilter==='todos'?allData:allData.filter(r=>r.status===currentFilter);
  const tbody=document.getElementById('tbody');
  if(!data.length){tbody.innerHTML=`<tr><td colspan="8" class="empty">Nenhum agendamento encontrado.</td></tr>`;return}
  tbody.innerHTML=data.map(r=>{
    const badgeClass='badge-'+(r.status||'confirmado');
    const statusLabel=(r.status||'confirmado').charAt(0).toUpperCase()+(r.status||'confirmado').slice(1);
    const dataFmt=r.data?new Date(r.data+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'}):'—';
    return `<tr>
      <td style="color:var(--muted);font-size:12px">#${r.id}</td>
      <td style="font-weight:700;color:var(--white)">${esc(r.nome)}</td>
      <td>${esc(r.servico)}</td>
      <td>${dataFmt}</td>
      <td style="color:var(--accent);font-weight:700">${esc(r.horario)}</td>
      <td style="color:var(--accent)">${esc(r.preco||'—')}</td>
      <td><span class="badge ${badgeClass}">${statusLabel}</span></td>
      <td>
        ${r.status!=='concluido'?`<button class="action-btn" onclick="updateStatus(${r.id},'concluido')">✓ Concluir</button>`:''}
        ${r.status!=='cancelado'?`<button class="action-btn" onclick="updateStatus(${r.id},'cancelado')">✗ Cancelar</button>`:''}
        <button class="action-btn del" onclick="deleteItem(${r.id})">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function updateStatus(id,status){
  await fetch('/api/agendamentos/'+id+'?pass='+encodeURIComponent(pass),{
    method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})
  });
  loadData();
}

async function deleteItem(id){
  if(!confirm('Excluir este agendamento?'))return;
  await fetch('/api/agendamentos/'+id+'?pass='+encodeURIComponent(pass),{method:'DELETE'});
  loadData();
}
</script>
</body>
</html>
